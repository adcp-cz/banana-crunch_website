<style>
    /* Menggunakan variabel dari design-system.css */
    .custom-navbar {
        background-color: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px); /* Efek blur premium ala iOS/macOS */
        box-shadow: var(--shadow-sm);
        padding: 15px 0;
        transition: padding var(--transition-normal), box-shadow var(--transition-normal);
        z-index: 1030;
    }

    /* Efek saat discroll (bisa ditrigger via JS, tapi defaultnya sticky) */
    .custom-navbar.scrolled {
        padding: 10px 0;
        box-shadow: var(--shadow-md);
    }

    .navbar-brand {
        font-family: var(--font-family);
        font-weight: var(--weight-bold);
        font-size: var(--text-2xl);
        color: var(--color-primary-dark) !important;
        letter-spacing: -0.5px;
    }

    .nav-item {
        margin: 0 10px;
    }

    .nav-link {
        font-family: var(--font-family);
        font-weight: var(--weight-medium);
        font-size: var(--text-base);
        color: var(--color-text-secondary) !important;
        position: relative;
        padding: 8px 0 !important;
        transition: color var(--transition-fast);
    }

    .nav-link:hover {
        color: var(--color-text) !important;
    }

    /* Hover Animation & Active Indicator */
    .nav-link::after {
        content: '';
        position: absolute;
        width: 0;
        height: 2px;
        bottom: 0;
        left: 50%;
        background-color: var(--color-primary);
        transition: all var(--transition-normal);
        transform: translateX(-50%);
        border-radius: var(--radius-pill);
    }

    .nav-link:hover::after,
    .nav-link.active::after {
        width: 100%;
    }

    .nav-link.active {
        color: var(--color-text) !important;
        font-weight: var(--weight-semibold);
    }

    /* Right Icons */
    .nav-icons {
        display: flex;
        align-items: center;
        gap: 1.5rem;
    }

    .icon-link {
        color: var(--color-text);
        font-size: var(--text-lg);
        position: relative;
        transition: color var(--transition-fast), transform var(--transition-fast);
    }

    .icon-link:hover {
        color: var(--color-primary-dark);
        transform: translateY(-2px);
    }

    /* Cart Notification Badge */
    .cart-badge {
        position: absolute;
        top: -6px;
        right: -8px;
        background-color: var(--color-primary);
        color: var(--color-text);
        font-size: 0.65rem;
        font-weight: var(--weight-bold);
        padding: 3px 6px;
        border-radius: var(--radius-pill);
        border: 2px solid var(--color-white);
    }

    /* Mobile Responsive Adjustments */
    @media (max-width: 991.98px) {
        .custom-navbar {
            padding: 10px 0;
        }
        .nav-icons {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--color-border);
            justify-content: center;
        }
        .nav-link::after {
            display: none; /* Matikan garis bawah di mobile agar lebih clean */
        }
        .nav-link {
            padding: 10px 15px !important;
            border-radius: var(--radius-md);
        }
        .nav-link:hover, .nav-link.active {
            background-color: rgba(255, 214, 0, 0.1);
        }
    }
</style>

<nav class="navbar navbar-expand-lg sticky-top custom-navbar">
    <div class="container">
        <a class="navbar-brand" href="index.html">PisangKraf</a>
        
        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarPisangKraf" aria-controls="navbarPisangKraf" aria-expanded="false" aria-label="Toggle navigation">
            <i class="fas fa-bars fs-4 text-dark"></i>
        </button>

        <div class="collapse navbar-collapse" id="navbarPisangKraf">
            <ul class="navbar-nav mx-auto mb-2 mb-lg-0 text-center">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="products.html">Products</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="about.html">About</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="contact.html">Contact</a>
                </li>
            </ul>

            <div class="nav-icons">
                <a href="#" class="icon-link" aria-label="Search">
                    <i class="fas fa-search"></i>
                </a>
                <a href="cart.html" class="icon-link" aria-label="Cart">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-badge">3</span>
                </a>
                <a href="user/profile.html" class="icon-link" aria-label="User Profile">
                    <i class="far fa-user"></i>
                </a>
            </div>
        </div>
    </div>
</nav>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const navbar = document.querySelector('.custom-navbar');
        window.addEventListener('scroll', function() {
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });
    });
</script>
